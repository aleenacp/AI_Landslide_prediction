<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Active Landslide Alerts</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #0d1117;
         color: #e6edf3; margin: 0; padding: 1rem; }
  .alert-card { border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem;
                border-left: 4px solid; }
  .alert-evacuate { background: rgba(139,92,246,.1); border-color: #8b5cf6; }
  .alert-warning  { background: rgba(239,68,68,.1);  border-color: #ef4444; }
  .alert-watch    { background: rgba(245,158,11,.1); border-color: #f59e0b; }
  .alert-title { font-size: 1.2rem; font-weight: 700; margin-bottom: .5rem; }
  .alert-body  { font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
  #map { height: 400px; border-radius: 12px; margin-bottom: 1.5rem; }
  .contacts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                   gap: 1rem; }
  .contact-card { background: #161b22; border: 1px solid #21262d; border-radius: 10px;
                  padding: 1rem; }
  .contact-name { font-weight: 600; margin-bottom: .3rem; }
  .contact-phone { font-size: 1.1rem; font-weight: 700; color: #22c55e; }
  .shelter-card { background: #161b22; border: 1px solid #21262d; border-radius: 10px;
                  padding: 1rem; margin-bottom: .75rem; }
  .occ-bar { height: 6px; background: #21262d; border-radius: 3px; margin-top: .5rem; }
  .occ-fill { height: 100%; border-radius: 3px; background: #22c55e; }
  h2 { margin: 1.5rem 0 1rem; font-size: 1.1rem; color: #8b949e;
       text-transform: uppercase; letter-spacing: .06em; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 10px;
         font-size: 11px; font-weight: 600; margin-right: 4px; }
  .tag-food    { background: rgba(34,197,94,.15);  color: #22c55e; }
  .tag-medical { background: rgba(59,130,246,.15); color: #3b82f6; }
</style>
</head>
<body>
<h1>🛰️ Live Landslide Alert Map</h1>
<div id="map"></div>
<div id="alerts-container"><p style="color:#8b949e">Loading alerts...</p></div>
<h2>📞 Emergency Contacts</h2>
<div id="contacts-container" class="contacts-grid"></div>
<h2>🏠 Available Shelters</h2>
<div id="shelters-container"></div>
<h2>🛡️ Safety Instructions</h2>
<div id="safety-container"></div>

<script>
const map = L.map('map').setView([10.8505, 76.2711], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const riskColors = {
  low:'#22c55e', moderate:'#f59e0b', high:'#ef4444', critical:'#8b5cf6'
};

async function loadAll() {
  // Load area warnings
  const alertResp = await fetch('/api/alerts/area-map/');
  const geojson   = await alertResp.json();
  geojson.features.forEach(f => {
    const p = f.properties;
    const color = riskColors[p.risk_level] || '#6b7280';
    L.circleMarker([f.geometry.coordinates[1], f.geometry.coordinates[0]], {
      radius: 12, fillColor: color, color: '#fff', weight: 2, fillOpacity: 0.85
    }).bindPopup(`
      <b>${p.location || 'Unknown'}</b><br>
      Risk: <b>${(p.risk_level||'').toUpperCase()}</b><br>
      Probability: ${p.probability ? (p.probability*100).toFixed(1)+'%' : '—'}<br>
      Date: ${p.date}
    `).addTo(map);
  });

  // Load public alerts
  const pubResp = await fetch('/api/alerts/');
  const alerts  = await pubResp.json();
  const alertsDiv = document.getElementById('alerts-container');
  if (!alerts.length) {
    alertsDiv.innerHTML = '<p style="color:#22c55e">✅ No active alerts at this time.</p>';
  } else {
    alertsDiv.innerHTML = alerts.map(a => `
      <div class="alert-card alert-${a.severity}">
        <div class="alert-title">⚠️ ${a.severity.toUpperCase()} — ${a.affected_district || 'Unknown Area'}</div>
        <div class="alert-body">${a.message_english}</div>
        ${a.message_malayalam ? `<div class="alert-body" style="margin-top:.75rem;opacity:.8">${a.message_malayalam}</div>` : ''}
      </div>`).join('');
  }

  // Emergency contacts
  const contacts = await (await fetch('/api/emergency-contacts/')).json();
  document.getElementById('contacts-container').innerHTML =
    contacts.map(c => `
      <div class="contact-card">
        <div class="contact-name">${c.name}</div>
        <div style="font-size:12px;color:#8b949e;margin-bottom:.4rem">${c.category.toUpperCase()}</div>
        <div class="contact-phone">📞 ${c.phone}</div>
        ${c.alt_phone ? `<div style="font-size:12px;color:#8b949e">${c.alt_phone}</div>` : ''}
      </div>`).join('');

  // Shelters
  const shelters = await (await fetch('/api/shelters/')).json();
  document.getElementById('shelters-container').innerHTML =
    shelters.map(s => `
      <div class="shelter-card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-weight:600">${s.name}</div>
          <div style="font-size:12px;color:#8b949e">${s.district}</div>
        </div>
        <div style="font-size:12px;color:#8b949e;margin:.3rem 0">${s.address}</div>
        ${s.has_food    ? '<span class="tag tag-food">🍚 Food</span>'    : ''}
        ${s.has_medical ? '<span class="tag tag-medical">🏥 Medical</span>':''}
        <div style="font-size:13px;margin-top:.5rem">
          Capacity: <b>${s.available_capacity}</b> available of ${s.capacity}
        </div>
        <div class="occ-bar"><div class="occ-fill" style="width:${s.occupancy_percent}%;
          background:${s.occupancy_percent>80?'#ef4444':'#22c55e'}"></div></div>
        ${s.contact_phone ? `<div style="font-size:12px;color:#22c55e;margin-top:.4rem">📞 ${s.contact_name}: ${s.contact_phone}</div>` : ''}
      </div>`).join('');

  // Safety instructions
  const severity = '{{ severity|default:"high" }}';
  const safety = await (await fetch(`/api/safety-instructions/?severity=${severity}`)).json();
  document.getElementById('safety-container').innerHTML =
    safety.map(i => `
      <div style="background:#161b22;border:1px solid #21262d;border-radius:10px;
                  padding:1rem;margin-bottom:.75rem">
        <div style="font-size:1.1rem;font-weight:600;margin-bottom:.4rem">
          ${i.icon} ${i.title_en}
        </div>
        ${i.title_ml ? `<div style="font-size:13px;color:#8b949e;margin-bottom:.5rem">${i.title_ml}</div>` : ''}
        <div style="font-size:14px;line-height:1.7">${i.body_en}</div>
      </div>`).join('');
}

loadAll();
</script>
</body>
</html>
