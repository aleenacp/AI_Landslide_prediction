<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Government Login — LandslideAI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117; color: #e6edf3;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
  }
  .card {
    background: #161b22; border: 1px solid #21262d;
    border-radius: 16px; padding: 2.5rem; width: 100%;
    max-width: 400px;
  }
  .logo { text-align: center; margin-bottom: 2rem; }
  .logo-icon { font-size: 3rem; }
  .logo-title { font-size: 1.4rem; font-weight: 700; margin-top: .5rem; }
  .logo-sub { font-size: 13px; color: #8b949e; margin-top: .25rem; }
  label { display: block; font-size: 13px; color: #8b949e;
          margin-bottom: .4rem; margin-top: 1rem; }
  input {
    width: 100%; padding: .75rem 1rem;
    background: #0d1117; border: 1px solid #21262d;
    border-radius: 8px; color: #e6edf3; font-size: 14px;
    font-family: inherit; outline: none;
  }
  input:focus { border-color: #3b82f6; }
  .btn {
    width: 100%; margin-top: 1.5rem; padding: .85rem;
    background: #3b82f6; color: #fff; border: none;
    border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .btn:hover { background: #2563eb; }
  .error {
    background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
    color: #ef4444; padding: .75rem 1rem; border-radius: 8px;
    font-size: 13px; margin-top: 1rem;
  }
  .back { text-align: center; margin-top: 1.5rem; font-size: 13px; }
  .back a { color: #3b82f6; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🏛️</div>
    <div class="logo-title">Government Control Unit</div>
    <div class="logo-sub">LandslideAI — Officer Login</div>
  </div>

  {% if form.errors %}
  <div class="error">
    ⚠️ Invalid username or password. Please try again.
  </div>
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <label for="username">Username</label>
    <input type="text" id="username" name="username"
           placeholder="Enter your username" autofocus/>

    <label for="password">Password</label>
    <input type="password" id="password" name="password"
           placeholder="Enter your password"/>

    <input type="hidden" name="next" value="{{ next }}"/>
    <button type="submit" class="btn">🔐 Login</button>
  </form>

  <div class="back">
    <a href="/">← Back to main app</a>
  </div>
</div>
</body>
</html>
